<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Jaishu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Karla:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1B1530;
    --bg-mid:#2E2150;
    --glass:rgba(255,255,255,0.08);
    --glass-strong:rgba(255,255,255,0.14);
    --glass-border:rgba(255,255,255,0.18);
    --text:#FBF7F1;
    --text-soft:rgba(251,247,241,0.68);
    --gold:#F2C879;
    --blush:#F2A6B8;
    --teal:#6FCBC4;
    --sage:#8FCB9B;
    --warn:#F2876B;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; min-height:100%; }
  body{
    background:radial-gradient(ellipse at top, var(--bg-mid), var(--bg-deep) 65%);
    color:var(--text);
    font-family:'Karla', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  .stage{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:32px 20px 60px;
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--text-soft);
    margin:0 0 6px;
    text-align:center;
  }
  h1.brand{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:22px;
    text-align:center;
    margin:0 0 30px;
    color:var(--gold);
  }
  .glass{
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-radius:var(--radius);
    padding:26px 22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
  }
  .center-stage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:18px;
  }

  /* glow halo */
  .halo{
    position:relative;
    width:200px;
    height:200px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .halo::before{
    content:'';
    position:absolute;
    inset:-26px;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--gold), var(--blush), var(--teal), var(--gold));
    filter:blur(22px);
    opacity:.55;
    animation:spin 10s linear infinite;
  }
  .halo img{
    position:relative;
    width:200px;
    height:200px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,255,255,0.55);
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes floatY{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }

  .greet{
    font-family:'Fraunces', serif;
    font-size:22px;
    margin:4px 0 0;
  }
  .greet-name{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:30px;
    color:var(--gold);
    margin:2px 0 0;
    text-shadow:0 0 18px rgba(242,200,121,0.45);
  }
  .blessing{
    font-size:14.5px;
    line-height:1.6;
    color:var(--text-soft);
    max-width:320px;
    margin:0;
  }
  .caption{
    font-size:12.5px;
    color:var(--text-soft);
    line-height:1.5;
    max-width:300px;
    margin:10px 0 0;
  }

  .btn-primary{
    font-family:'Karla',sans-serif;
    font-weight:700;
    font-size:15px;
    border:none;
    background:linear-gradient(135deg, var(--gold), var(--blush));
    color:#241733;
    padding:14px 30px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(242,166,184,0.3);
    transition:transform .15s;
  }
  .btn-primary:active{ transform:scale(.97); }
  .btn-secondary{
    font-family:'Karla',sans-serif;
    font-weight:600;
    font-size:13.5px;
    border:1.5px solid var(--glass-border);
    background:var(--glass);
    color:var(--text);
    padding:10px 20px;
    border-radius:999px;
    cursor:pointer;
  }

  input[type=password], input[type=text], textarea{
    font-family:'Karla',sans-serif;
    font-size:14px;
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1.5px solid var(--glass-border);
    background:rgba(255,255,255,0.06);
    color:var(--text);
  }
  input::placeholder, textarea::placeholder{ color:var(--text-soft); }
  input:focus, textarea:focus{ outline:none; border-color:var(--gold); }
  .error-text{ color:var(--warn); font-size:13px; margin-top:8px; min-height:18px; }

  /* dashboard backgrounds */
  .bg-layer{
    position:fixed; inset:0; z-index:0;
    opacity:0; transition:opacity 2.2s ease;
    background-repeat:no-repeat;
    background-position:center 18%;
    background-size:340px;
    filter:blur(.3px);
  }
  .bg-layer.visible{ opacity:.16; }
  .scrim{ position:fixed; inset:0; z-index:1; background:radial-gradient(ellipse at top, transparent, var(--bg-deep) 80%); pointer-events:none; }

  .quote-card{
    text-align:center;
    margin-bottom:20px;
  }
  .quote-card .eyebrow{ margin-bottom:8px; }
  .quote-card p{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:16px;
    margin:0;
    color:var(--text);
  }

  .progress-row{ display:flex; align-items:center; gap:10px; margin:14px 0 22px; }
  .progress-track{ flex:1; height:8px; border-radius:999px; background:rgba(255,255,255,0.12); overflow:hidden; }
  .progress-fill{ height:100%; border-radius:999px; background:linear-gradient(90deg, var(--gold), var(--blush)); transition:width .35s; }
  .progress-count{ font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--text-soft); white-space:nowrap; }

  .tabs{ display:flex; background:var(--glass); border:1px solid var(--glass-border); border-radius:999px; padding:4px; margin-bottom:18px; }
  .tab-btn{ flex:1; font-family:'Karla',sans-serif; font-weight:600; font-size:13px; border:none; background:transparent; padding:9px 0; border-radius:999px; cursor:pointer; color:var(--text-soft); }
  .tab-btn.active{ background:linear-gradient(135deg, var(--gold), var(--blush)); color:#241733; }

  .period-card{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; padding:16px 16px; margin-bottom:12px;
    border-radius:16px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    cursor:pointer;
    transition:background .2s;
  }
  .period-card:hover{ background:var(--glass-strong); }
  .period-left{ display:flex; align-items:center; gap:12px; }
  .period-emoji{ font-size:26px; }
  .period-name{ font-family:'Fraunces', serif; font-size:16px; }
  .period-sub{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--text-soft); }
  .period-chip{
    font-family:'IBM Plex Mono', monospace; font-size:12px;
    padding:5px 11px; border-radius:999px; background:rgba(255,255,255,0.1);
  }
  .period-chip.complete{ background:rgba(143,203,155,0.25); color:var(--sage); }

  .form-item{ margin-bottom:18px; }
  .form-item-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; }
  .form-label{ font-weight:600; font-size:14.5px; }
  .form-sub{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--text-soft); margin-left:6px; }
  .yn-group{ display:flex; gap:8px; }
  .yn-btn{
    font-family:'Karla',sans-serif; font-weight:700; font-size:12.5px;
    border:1.5px solid var(--glass-border); background:var(--glass);
    color:var(--text-soft); padding:7px 16px; border-radius:999px; cursor:pointer;
  }
  .yn-btn.active.yes{ background:rgba(143,203,155,0.25); border-color:var(--sage); color:var(--sage); }
  .yn-btn.active.no{ background:rgba(242,135,107,0.2); border-color:var(--warn); color:var(--warn); }
  textarea{ min-height:80px; resize:vertical; }

  .back-link{
    font-family:'Karla',sans-serif; font-size:13px; color:var(--text-soft);
    background:none; border:none; cursor:pointer; margin-bottom:16px;
    display:inline-flex; align-items:center; gap:6px; padding:0;
  }

  .success-emoji{ font-size:54px; animation:floatY 2.5s ease-in-out infinite; }
  .success-title{ font-family:'Fraunces', serif; font-size:22px; margin:6px 0 0; }
  .success-note{ font-size:14px; color:var(--text-soft); line-height:1.6; max-width:300px; }

  .history-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--glass-border); cursor:pointer; }
  .history-row:last-child{ border-bottom:none; }
  .history-date{ font-weight:600; font-size:14px; }
  .history-sub{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--text-soft); }
  .history-detail{ display:none; padding:6px 0 14px; }
  .history-detail.open{ display:block; }
  .detail-line{ display:flex; justify-content:space-between; font-size:13px; padding:5px 0; color:var(--text-soft); }
  .detail-line.done{ color:var(--text); }
  .empty{ color:var(--text-soft); font-size:13.5px; font-style:italic; padding:6px 0; }

  .footer-note{ text-align:center; font-size:11.5px; color:var(--text-soft); margin-top:24px; line-height:1.6; }

  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>

window.storage = {
  get: async (key) => {
    const date = key.replace('day:', '');
    const res = await fetch('/get_task_data?date=' + date).then(r=>r.json());
    return res.value ? { value: res.value } : null;
  },
  set: async (key, val) => {
    const date = key.replace('day:', '');
    await fetch('/submit_task', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ date: date, data_json: val })
    });
  },
  list: async (prefix) => {
    const res = await fetch('/history_keys').then(r=>r.json());
    return { keys: res.keys || [] };
  }
};

const PERIODS = {
  morning: {
    label:'Morning', emoji:'🌅',
    items:[
      {key:'coffee', label:'Coffee', type:'toggle'},
      {key:'breakfast', label:'Breakfast', type:'text', placeholder:'What did she eat?'},
      {key:'water', label:'Water', sub:'500 ml', type:'toggle'}
    ],
    successNote:'Have a wonderful day, stay safe, and enjoy your classes.'
  },
  afternoon: {
    label:'Afternoon', emoji:'☀️',
    items:[
      {key:'lunch', label:'Lunch', type:'text', placeholder:'What did she eat?'},
      {key:'water', label:'Water', sub:'500 ml', type:'toggle'},
      {key:'fruit', label:'Fruit', type:'text', placeholder:'Which fruit?'}
    ],
    successNote:'Hope your day is going well — keep taking good care of yourself.'
  },
  evening: {
    label:'Evening', emoji:'🌇',
    items:[
      {key:'coffee', label:'Coffee', type:'toggle'},
      {key:'water', label:'Water', sub:'500 ml', type:'toggle'}
    ],
    successNote:'Almost there for today. Travel safe and take care.'
  },
  night: {
    label:'Night', emoji:'🌙',
    items:[
      {key:'dinner', label:'Dinner', type:'text', placeholder:'What did she eat?'},
      {key:'water', label:'Water', sub:'500 ml', type:'toggle'},
      {key:'milk', label:'Milk', type:'toggle'},
      {key:'note', label:'Tell me about your day', type:'textarea', placeholder:'Anything you want to share…'}
    ],
    successNote:'Sleep peacefully and have sweet dreams.'
  }
};
const PERIOD_ORDER = ['morning','afternoon','evening','night'];

const BG_THEMES = [
  { color:'#F2C879', svg: svgPanda() },
  { color:'#B7C7F2', svg: svgMoon() },
  { color:'#F2A6B8', svg: svgBlossom() },
  { color:'#6FCBC4', svg: svgOcean() },
  { color:'#8FCB9B', svg: svgForest() }
];

let screen = 'dashboard';
let passError = '';
let todayKey = dateKey(new Date());
let todayData = emptyDay();
let activeForm = null;
let dashTab = 'today';
let bgTimer = null;
let bgIndex = 0;
let bgToggle = 0;

function emptyDay(){
  const d = {};
  PERIOD_ORDER.forEach(p=>{
    d[p] = {};
    PERIODS[p].items.forEach(it=>{
      d[p][it.key] = (it.type==='toggle') ? {done:false, at:null} : {text:'', at:null};
    });
  });
  return d;
}
function dateKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function prettyDate(key){
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'long', day:'numeric', month:'long'});
}
function shortDate(key){
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'short', day:'numeric', month:'short'});
}
function timeOf(iso){ return iso ? new Date(iso).toLocaleTimeString(undefined,{hour:'numeric', minute:'2-digit'}) : ''; }
function partOfDay(){
  const h = new Date().getHours();
  if(h<12) return 'morning';
  if(h<17) return 'afternoon';
  if(h<20) return 'evening';
  return 'night';
}
function greetingText(){
  const p = partOfDay();
  return ({morning:'🌅 Good Morning ☀️', afternoon:'☀️ Good Afternoon 🌸', evening:'🌇 Good Evening ✨', night:'🌙 Good Night ❤️'})[p];
}
function periodCount(periodData, periodKey){
  let n=0;
  PERIODS[periodKey].items.forEach(it=>{
    const v = periodData[it.key];
    if(it.type==='toggle' ? v.done : (v.text && v.text.trim())) n++;
  });
  return n;
}
function totalItems(){ return PERIOD_ORDER.reduce((s,p)=> s + PERIODS[p].items.length, 0); }
function totalDone(data){ return PERIOD_ORDER.reduce((s,p)=> s + periodCount(data[p], p), 0); }

async function loadToday(){
  try{
    const res = await window.storage.get('day:'+todayKey, true);
    todayData = res && res.value ? {...emptyDay(), ...mergeDeep(emptyDay(), JSON.parse(res.value))} : emptyDay();
  }catch(e){ todayData = emptyDay(); }
}
function mergeDeep(base, incoming){
  const out = {...base};
  PERIOD_ORDER.forEach(p=>{ out[p] = {...base[p], ...(incoming[p]||{})}; });
  return out;
}
async function saveToday(){
  try{ await window.storage.set('day:'+todayKey, JSON.stringify(todayData), true); }
  catch(e){ console.error('save failed', e); }
}

function startBgRotation(){
  if(bgTimer) return;
  const a = document.getElementById('bgA');
  const b = document.getElementById('bgB');
  function apply(layer, theme){
    layer.style.backgroundImage = `url("data:image/svg+xml,${encodeURIComponent(theme.svg)}")`;
  }
  apply(a, BG_THEMES[0]); a.classList.add('visible');
  bgIndex = 0; bgToggle = 0;
  bgTimer = setInterval(()=>{
    bgIndex = (bgIndex+1) % BG_THEMES.length;
    const showing = bgToggle===0 ? b : a;
    const hiding = bgToggle===0 ? a : b;
    apply(showing, BG_THEMES[bgIndex]);
    showing.classList.add('visible');
    hiding.classList.remove('visible');
    bgToggle = bgToggle===0 ? 1 : 0;
  }, 11000);
}

function render(){
  const app = document.getElementById('app');
  if(screen==='lock') return renderLock(app);
  if(screen==='welcome1') return renderWelcome1(app);
  if(screen==='welcome2') return renderWelcome2(app);
  startBgRotation();
  if(screen==='dashboard') return renderDashboard(app);
  if(screen==='form') return renderForm(app);
  if(screen==='success') return renderSuccess(app);
}

function renderLock(app){
  app.innerHTML = `
    <div class="center-stage">
      <p class="eyebrow">Private space</p>
      <h1 class="brand">for Jaishu ❤️</h1>
      <div class="glass" style="width:100%; max-width:300px;">
        <p class="form-label" style="margin-bottom:10px; text-align:center;">Enter passcode</p>
        <input type="password" id="passInput" placeholder="••••" autofocus />
        <p class="error-text">${passError}</p>
        <button class="btn-primary" style="width:100%; margin-top:6px;" id="unlockBtn">Unlock</button>
      </div>
    </div>
  `;
  const submit = ()=>{
    const val = document.getElementById('passInput').value;
    if(val === PASSCODE){ passError=''; screen='welcome1'; render(); }
    else{ passError = 'Incorrect passcode'; render(); }
  };
  document.getElementById('unlockBtn').addEventListener('click', submit);
  document.getElementById('passInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
}

function renderWelcome1(app){
  app.innerHTML = `
    <div class="center-stage">
      <div class="halo"><img src="${PROFILE_IMG}" alt="" /></div>
      <p class="greet">${greetingText()}</p>
      <p class="greet-name">Welcome, Jaishu ❤️</p>
      <button class="btn-primary" id="nextBtn">Next ➡️</button>
    </div>
  `;
  document.getElementById('nextBtn').addEventListener('click', ()=>{ screen='welcome2'; render(); });
}

function renderWelcome2(app){
  app.innerHTML = `
    <div class="center-stage">
      <div class="halo"><img src="${MURUGAN_IMG}" alt="" /></div>
      <p class="greet">🙏 Welcome 🙏</p>
      <p class="blessing">May Lord Murugan bless your day with happiness, health, peace, strength and success.</p>
      <button class="btn-primary" id="goBtn">✅ Go to your tasks</button>
      <p class="caption">Complete today's tasks with care. Every healthy habit builds a better tomorrow.</p>
    </div>
  `;
  document.getElementById('goBtn').addEventListener('click', async ()=>{
    await loadToday();
    screen='dashboard'; render();
  });
}

function renderDashboard(app){
  const done = totalDone(todayData);
  const total = totalItems();
  app.innerHTML = `
    <p class="eyebrow">for Jaishu</p>
    <h1 class="brand">Daily Care</h1>
    <div class="glass quote-card">
      <p class="eyebrow">🙏 Murugan says</p>
      <p>"Complete today's tasks with discipline."</p>
    </div>
    <div class="tabs">
      <button class="tab-btn ${dashTab==='today'?'active':''}" data-tab="today">Today</button>
      <button class="tab-btn ${dashTab==='history'?'active':''}" data-tab="history">History</button>
    </div>
    <div id="dashPanel"></div>
  `;
  app.querySelectorAll('.tab-btn').forEach(b=> b.addEventListener('click', ()=>{ dashTab=b.dataset.tab; renderDashboard(app); }));
  const panel = document.getElementById('dashPanel');
  if(dashTab==='today'){
    panel.innerHTML = `
      <div class="glass" style="margin-bottom:16px;">
        <div class="progress-row" style="margin:0;">
          <div class="progress-track"><div class="progress-fill" style="width:${(done/total*100).toFixed(0)}%"></div></div>
          <span class="progress-count">${done} / ${total}</span>
        </div>
      </div>
      ${PERIOD_ORDER.map(p=>{
        const cnt = periodCount(todayData[p], p);
        const ptotal = PERIODS[p].items.length;
        const complete = cnt===ptotal;
        return `
          <div class="period-card" data-period="${p}">
            <div class="period-left">
              <span class="period-emoji">${PERIODS[p].emoji}</span>
              <div>
                <div class="period-name">${PERIODS[p].label}</div>
                <div class="period-sub">${cnt} of ${ptotal} logged</div>
              </div>
            </div>
            <span class="period-chip ${complete?'complete':''}">${complete? 'Done' : 'Open'}</span>
          </div>
        `;
      }).join('')}
      <p class="footer-note">This space is shared between the two of you — whatever's logged here, you'll both see it.</p>
    `;
    panel.querySelectorAll('.period-card').forEach(c=> c.addEventListener('click', ()=>{ activeForm=c.dataset.period; screen='form'; render(); }));
  } else {
    panel.innerHTML = `<div class="glass"><p class="form-label" style="margin-bottom:10px;">History</p><div id="historyList"><p class="empty">Loading…</p></div></div>`;
    loadHistory();
  }
}

function renderForm(app){
  const p = activeForm;
  const conf = PERIODS[p];
  const data = todayData[p];
  app.innerHTML = `
    <button class="back-link" id="backBtn">‹ Dashboard</button>
    <h1 class="brand" style="margin-bottom:4px;">${conf.emoji} ${conf.label} routine</h1>
    <p class="eyebrow" style="margin-bottom:22px;">${prettyDate(todayKey)}</p>
    <div class="glass">
      ${conf.items.map(it=> itemFormHTML(it, data[it.key])).join('')}
      <button class="btn-primary" style="width:100%;" id="submitBtn">${conf.label} Submit</button>
    </div>
  `;
  document.getElementById('backBtn').addEventListener('click', ()=>{ screen='dashboard'; render(); });
  wireForm(app, p);
}

function itemFormHTML(it, v){
  if(it.type==='toggle'){
    return `
      <div class="form-item">
        <div class="form-item-row">
          <span class="form-label">${it.label}${it.sub?`<span class="form-sub">${it.sub}</span>`:''}</span>
          <div class="yn-group" data-key="${it.key}">
            <button class="yn-btn yes ${v.done===true?'active yes':''}" data-val="yes">Yes</button>
            <button class="yn-btn no ${v.done===false && v.at!==null?'active no':''}" data-val="no">No</button>
          </div>
        </div>
      </div>
    `;
  }
  if(it.type==='textarea'){
    return `
      <div class="form-item">
        <p class="form-label" style="margin-bottom:8px;">${it.label}</p>
        <textarea data-key="${it.key}" placeholder="${it.placeholder}">${v.text||''}</textarea>
      </div>
    `;
  }
  return `
    <div class="form-item">
      <p class="form-label" style="margin-bottom:8px;">${it.label}</p>
      <input type="text" data-key="${it.key}" placeholder="${it.placeholder}" value="${(v.text||'').replace(/"/g,'&quot;')}" />
    </div>
  `;
}

function wireForm(app, p){
  app.querySelectorAll('.yn-group').forEach(group=>{
    group.querySelectorAll('.yn-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const key = group.dataset.key;
        const isYes = btn.dataset.val === 'yes';
        todayData[p][key] = { done:isYes, at:new Date().toISOString() };
        group.querySelectorAll('.yn-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active', isYes?'yes':'no');
      });
    });
  });
  document.getElementById('submitBtn').addEventListener('click', async ()=>{
    app.querySelectorAll('[data-key]').forEach(el=>{
      if(el.tagName==='TEXTAREA' || el.tagName==='INPUT'){
        const key = el.dataset.key;
        const val = el.value.trim();
        todayData[p][key] = { text:val, at: val? new Date().toISOString(): null };
      }
    });
    await saveToday();
    screen='success'; render();
  });
}

function renderSuccess(app){
  const p = activeForm;
  const conf = PERIODS[p];
  app.innerHTML = `
    <div class="center-stage">
      <div class="success-emoji">${conf.emoji}</div>
      <p class="success-title">Soopernga, Jaishu!</p>
      <p class="success-note">${conf.label} routine logged. ${conf.successNote}</p>
      <button class="btn-secondary" id="continueBtn">Continue</button>
    </div>
  `;
  document.getElementById('continueBtn').addEventListener('click', ()=>{ screen='dashboard'; render(); });
}

async function loadHistory(){
  const box = document.getElementById('historyList');
  try{
    const res = await window.storage.list('day:', true);
    const keys = (res && res.keys) ? res.keys : [];
    const dateKeys = keys.map(k=> k.startsWith('day:')? k.slice(4): k).filter(k=> k!==todayKey).sort((a,b)=> b.localeCompare(a));
    if(dateKeys.length===0){ box.innerHTML = `<p class="empty">No earlier days yet — they'll appear here once a day passes.</p>`; return; }
    const rows = [];
    for(const dk of dateKeys){
      try{
        const r = await window.storage.get('day:'+dk, true);
        rows.push({ dk, data: {...emptyDay(), ...mergeDeep(emptyDay(), JSON.parse(r.value))} });
      }catch(e){}
    }
    box.innerHTML = rows.map(({dk, data})=>{
      const done = totalDone(data), total = totalItems();
      return `
        <div>
          <div class="history-row" data-day="${dk}">
            <div><div class="history-date">${shortDate(dk)}</div><div class="history-sub">${dk}</div></div>
            <span class="period-chip ${done===total?'complete':''}">${done}/${total}</span>
          </div>
          <div class="history-detail" id="detail-${dk}">
            ${PERIOD_ORDER.map(p=> PERIODS[p].items.map(it=>{
              const v = data[p][it.key];
              const has = it.type==='toggle' ? v.done : !!(v.text && v.text.trim());
              const val = it.type==='toggle' ? (v.done? 'Yes at '+timeOf(v.at) : 'No') : (v.text || 'Not logged');
              return `<div class="detail-line ${has?'done':''}"><span>${PERIODS[p].emoji} ${it.label}</span><span>${val}</span></div>`;
            }).join('')).join('')}
          </div>
        </div>
      `;
    }).join('');
    box.querySelectorAll('.history-row').forEach(row=> row.addEventListener('click', ()=>{
      document.getElementById('detail-'+row.dataset.day).classList.toggle('open');
    }));
  }catch(e){
    box.innerHTML = `<p class="empty">Couldn't load history right now.</p>`;
  }
}
